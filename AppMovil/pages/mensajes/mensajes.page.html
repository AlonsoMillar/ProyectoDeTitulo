<ion-header class="ion-no-border">
  <ion-toolbar class="glass-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>Soporte Técnico</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="chat-page">
  <div *ngIf="cargando" class="ion-text-center ion-padding">
    <ion-spinner name="crescent" color="light"></ion-spinner>
  </div>

  <div class="chat-container" *ngIf="!cargando">
    <div *ngFor="let msg of mensajes" 
         [ngClass]="msg.senderUid === currentUserUid ? 'message-wrapper right' : 'message-wrapper left'">
      
      <div class="message-bubble">
        <span class="sender-name" *ngIf="msg.senderUid !== currentUserUid">
          {{ msg.senderAlias }}
        </span>
        <p>{{ msg.contenido }}</p>
        <small class="msg-time" *ngIf="msg.createdAt">{{ msg.createdAt | date:'HH:mm' }}</small>
      </div>
    </div>

    <div *ngIf="mensajes.length === 0" class="empty-chat">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <p>Cuéntanos tu duda, estamos para ayudarte.</p>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="glass-footer">
    <div class="input-container">
      <ion-input [(ngModel)]="nuevoTexto" placeholder="Escribe un mensaje..." class="custom-chat-input"></ion-input>
      <ion-button class="send-btn" shape="round" (click)="enviar()" [disabled]="!nuevoTexto.trim()">
        <ion-icon name="send" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
