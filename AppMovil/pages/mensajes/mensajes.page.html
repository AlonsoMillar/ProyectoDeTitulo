<ion-header class="ion-no-border">
  <ion-toolbar class="glass-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="light" mode="md"></ion-back-button>
    </ion-buttons>
    
    <ion-title mode="ios">Soporte Técnico</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="chat-page">
  <!-- Capas de fondo para dar profundidad -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div *ngIf="cargando" class="loader-wrapper">
    <ion-spinner name="bubbles" color="primary"></ion-spinner>
  </div>

  <div class="chat-container" *ngIf="!cargando">
    <div *ngFor="let msg of mensajes" 
         [ngClass]="msg.senderUid === currentUserUid ? 'message-wrapper right' : 'message-wrapper left'">
      
      <div class="message-bubble">
        <!-- Badge del Administrador (Mantenido) -->
        <div class="admin-badge" *ngIf="msg.senderUid !== currentUserUid">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
          {{ msg.senderAlias }}
        </div>

        <div class="bubble-text">
          <p>{{ msg.contenido }}</p>
        </div>
        
        <div class="bubble-meta">
          <small class="msg-time">{{ msg.createdAt | date:'HH:mm' }}</small>
          <ion-icon name="checkmark-done-outline" *ngIf="msg.senderUid === currentUserUid"></ion-icon>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="mensajes.length === 0" class="premium-empty">
      <div class="empty-art">
        <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
      </div>
      <h3>¿Cómo podemos ayudarte?</h3>
      <p>Envíanos un mensaje y un técnico te atenderá pronto.</p>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="premium-footer">
    <div class="input-wrapper">
      <ion-input 
        [(ngModel)]="nuevoTexto" 
        placeholder="Escribe un mensaje..." 
        class="main-chat-input"
        (keyup.enter)="enviar()"
      ></ion-input>
      
      <ion-button class="action-btn" (click)="enviar()" [disabled]="!nuevoTexto.trim()">
        <ion-icon name="paper-plane" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
