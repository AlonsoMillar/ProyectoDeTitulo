<ion-header class="ion-no-border">

  <ion-toolbar class="transparent-toolbar">

    <!-- TÍTULO -->
    <ion-title class="client-title">
      Tu Gremio
    </ion-title>

    <!-- MENÚ -->
    <ion-buttons slot="end">

      <ion-button
        id="click-trigger"
        class="menu-trigger-btn"
        fill="clear"
      >
        <ion-icon
          name="ellipsis-vertical"
          slot="icon-only">
        </ion-icon>
      </ion-button>

    </ion-buttons>

    <!-- POPOVER -->
    <ion-popover
      trigger="click-trigger"
      triggerAction="click"
      [dismissOnSelect]="true"
      side="bottom"
      alignment="end"
    >

      <ng-template>

        <ion-content class="popover-menu-content">

          <ion-list lines="none">

            <ion-item
              button
              [routerLink]="['/perfil']"
            >
              <ion-icon
                name="person-outline"
                slot="start">
              </ion-icon>

              <ion-label>
                Mi Perfil
              </ion-label>
            </ion-item>

            <ion-item
              button
              [routerLink]="['/contacto']"
            >
              <ion-icon
                name="information-circle-outline"
                slot="start">
              </ion-icon>

              <ion-label>
                Contacto y Visión
              </ion-label>
            </ion-item>

          </ion-list>

        </ion-content>

      </ng-template>

    </ion-popover>

  </ion-toolbar>

</ion-header>

<!-- CONTENT -->

<ion-content class="home-page">

  <div class="main-content">

    <!-- AVATAR -->
    <div class="avatar-container">

      <div class="glow-ring"></div>

      <img
        *ngIf="userAvatar"
        [src]="userAvatar"
        alt="Profile"
        class="profile-img"
        referrerpolicy="no-referrer"
      >

      <ion-icon
        *ngIf="!userAvatar"
        name="person-circle"
        class="fallback-img">
      </ion-icon>

    </div>

    <!-- TEXTO -->
    <div class="welcome-text">

      <p>
        Hola jugador:
      </p>

      <h1>
        {{ userAlias }}
      </h1>

    </div>

    <!-- CARD -->
    <div class="empty-state-card">

      <ion-icon
        name="game-controller-outline"
        class="empty-icon">
      </ion-icon>

      <h3>
        Sin torneos activos
      </h3>

      <p>
        Aún no estás inscrito en ningún evento.
        Revisa tu perfil para unirte a un gremio.
      </p>

    </div>

  </div>

</ion-content>

<!-- FOOTER -->

<ion-footer class="ion-no-border">

  <ion-toolbar class="custom-tab-bar">

    <div class="tab-container">

      <!-- HOME -->
      <ion-button
        fill="clear"
        (click)="irA('/home')"
        class="tab-btn active"
      >
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>

      <!-- MENSAJES -->
      <ion-button
        fill="clear"
        (click)="irA('/mensajes')"
        class="tab-btn"
      >
        <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
      </ion-button>

      <!-- EVENTOS -->
      <ion-button
        fill="clear"
        (click)="irA('/eventos')"
        class="tab-btn"
      >
        <ion-icon name="calendar-outline"></ion-icon>
      </ion-button>

    </div>

  </ion-toolbar>

</ion-footer>
