<ion-header class="ion-no-border">
  <ion-toolbar class="transparent-toolbar">
    <ion-title class="client-title">Tu Gremio</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" class="logout-btn">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-page">
  <div class="main-content">
    
    <div class="avatar-container">
      <div class="glow-ring"></div>
      <img *ngIf="userAvatar" [src]="userAvatar" alt="Profile" class="profile-img" referrerpolicy="no-referrer">
      <ion-icon *ngIf="!userAvatar" name="person-circle" class="fallback-img"></ion-icon>
    </div>

    <div class="welcome-text">
      <p>Hola jugador:</p>
      <h1>{{ userAlias }}</h1>
    </div>

    <div class="empty-state-card">
      <ion-icon name="game-controller-outline" class="empty-icon"></ion-icon>
      <h3>Sin torneos activos</h3>
      <p>Aún no estás inscrito en ningún evento. Únete a una tienda para empezar a jugar.</p>
    </div>

    <ion-button expand="block" class="scan-btn" (click)="scanQR()">
      <ion-icon name="qr-code-outline" slot="start"></ion-icon>
      Escanear QR de Tienda
    </ion-button>

  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="custom-tab-bar">
    <div class="tab-container">
      <ion-button fill="clear" (click)="irA('/home')" class="tab-btn active">
        <ion-icon name="home-outline"></ion-icon>
        <span></span>
      </ion-button>

      <ion-button fill="clear" (click)="irA('/mensajes')" class="tab-btn">
        <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
        <span></span>
      </ion-button>

      <ion-button fill="clear" (click)="irA('/eventos')" class="tab-btn">
        <ion-icon name="calendar-outline"></ion-icon>
        <span></span>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
